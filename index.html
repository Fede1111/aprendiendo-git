<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aprende Git - Tutorial Interactivo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700;800&display=swap');

  :root {
    --bg: #0d1117;
    --bg-secondary: #161b22;
    --bg-tertiary: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --accent-glow: rgba(88,166,255,0.15);
    --green: #3fb950;
    --green-glow: rgba(63,185,80,0.15);
    --red: #f85149;
    --orange: #d29922;
    --purple: #bc8cff;
    --sidebar-w: 280px;
    --terminal-bg: #0a0e14;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    height: 100vh;
  }

  .app {
    display: flex;
    height: 100vh;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: var(--sidebar-w);
    min-width: var(--sidebar-w);
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: transform 0.3s ease;
  }

  .sidebar-header {
    padding: 20px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-header h1 {
    font-size: 1.1rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .sidebar-header h1 .icon { font-size: 1.4rem; }

  .sidebar-header p {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .progress-bar-container {
    margin-top: 12px;
    background: var(--bg-tertiary);
    border-radius: 6px;
    height: 6px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--green), var(--accent));
    border-radius: 6px;
    transition: width 0.5s ease;
    width: 0%;
  }

  .progress-text {
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-top: 4px;
    text-align: right;
  }

  .lessons-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .lessons-list::-webkit-scrollbar { width: 4px; }
  .lessons-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .lesson-group-title {
    font-size: 0.65rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    padding: 12px 12px 4px;
  }

  .lesson-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 0.85rem;
    position: relative;
  }

  .lesson-item:hover { background: var(--bg-tertiary); }
  .lesson-item.active { background: var(--accent-glow); color: var(--accent); font-weight: 500; }
  .lesson-item.completed .lesson-check { color: var(--green); }
  .lesson-item.locked { opacity: 0.4; cursor: not-allowed; }

  .lesson-check {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    flex-shrink: 0;
  }

  .lesson-item.completed .lesson-check {
    border-color: var(--green);
    background: var(--green-glow);
  }

  .lesson-item.active .lesson-check {
    border-color: var(--accent);
    background: var(--accent-glow);
  }

  /* ── Main Content ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-secondary);
    min-height: 52px;
  }

  .topbar-title {
    font-size: 0.85rem;
    font-weight: 600;
  }

  .topbar-actions {
    display: flex;
    gap: 8px;
  }

  .btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg-tertiary);
    color: var(--text);
    font-size: 0.8rem;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .btn:hover { border-color: var(--text-muted); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  .btn-primary:hover { background: #79b8ff; }
  .btn-success { background: var(--green); border-color: var(--green); color: #fff; font-weight: 600; }

  .content-area {
    flex: 1;
    overflow-y: auto;
    padding: 32px;
  }

  .content-area::-webkit-scrollbar { width: 6px; }
  .content-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* ── Lesson Content ── */
  .lesson-content {
    max-width: 760px;
    margin: 0 auto;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .lesson-content h2 {
    font-size: 1.8rem;
    font-weight: 800;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .lesson-content h3 {
    font-size: 1.15rem;
    font-weight: 700;
    margin: 28px 0 12px;
    color: var(--accent);
  }

  .lesson-content p, .lesson-content li {
    font-size: 0.95rem;
    line-height: 1.7;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .lesson-content ul {
    padding-left: 20px;
    margin-bottom: 12px;
  }

  .lesson-content strong { color: var(--text); }

  .lesson-badge {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--accent-glow);
    color: var(--accent);
    margin-bottom: 16px;
  }

  /* ── Code Blocks ── */
  .code-block {
    background: var(--terminal-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin: 16px 0;
    overflow: hidden;
  }

  .code-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 16px;
    background: var(--bg-tertiary);
    border-bottom: 1px solid var(--border);
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  .code-block pre {
    padding: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    line-height: 1.6;
    overflow-x: auto;
    color: var(--green);
  }

  .code-block pre .comment { color: var(--text-muted); }
  .code-block pre .flag { color: var(--orange); }
  .code-block pre .string { color: var(--purple); }
  .code-block pre .cmd { color: var(--accent); }

  .copy-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 0.75rem;
    padding: 2px 8px;
    border-radius: 4px;
    transition: all 0.15s;
  }
  .copy-btn:hover { color: var(--text); background: var(--bg); }

  /* ── Info Box ── */
  .info-box {
    background: var(--accent-glow);
    border-left: 3px solid var(--accent);
    padding: 14px 18px;
    border-radius: 0 8px 8px 0;
    margin: 16px 0;
    font-size: 0.88rem;
    line-height: 1.6;
  }

  .info-box.warning {
    background: rgba(210,153,34,0.1);
    border-left-color: var(--orange);
  }

  .info-box.tip {
    background: var(--green-glow);
    border-left-color: var(--green);
  }

  .info-box strong { color: var(--text); }

  /* ── Interactive Terminal ── */
  .terminal {
    background: var(--terminal-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin: 16px 0;
    overflow: hidden;
  }

  .terminal-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    background: var(--bg-tertiary);
    border-bottom: 1px solid var(--border);
  }

  .terminal-dot {
    width: 10px; height: 10px; border-radius: 50%;
  }
  .terminal-dot.red { background: #ff5f56; }
  .terminal-dot.yellow { background: #ffbd2e; }
  .terminal-dot.green { background: #27c93f; }

  .terminal-title {
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-left: 8px;
    font-family: 'JetBrains Mono', monospace;
  }

  .terminal-body {
    padding: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    line-height: 1.8;
    max-height: 350px;
    overflow-y: auto;
  }

  .terminal-body::-webkit-scrollbar { width: 4px; }
  .terminal-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .terminal-line {
    white-space: pre-wrap;
    word-break: break-all;
  }

  .terminal-line .prompt { color: var(--green); }
  .terminal-line .prompt::before { content: '$ '; }

  .terminal-line .output { color: var(--text-muted); }
  .terminal-line .error { color: var(--red); }
  .terminal-line .highlight { color: var(--accent); }
  .terminal-line .branch { color: var(--orange); }

  .terminal-input-line {
    display: flex;
    align-items: center;
    gap: 0;
  }

  .terminal-input-line .prompt { color: var(--green); flex-shrink: 0; }

  .terminal-input {
    flex: 1;
    background: none;
    border: none;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    outline: none;
    caret-color: var(--green);
  }

  /* ── Visual Diagram ── */
  .git-diagram {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
    flex-wrap: wrap;
    justify-content: center;
  }

  .git-zone {
    background: var(--bg-tertiary);
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 16px;
    min-width: 160px;
    text-align: center;
    transition: all 0.3s;
  }

  .git-zone.active {
    border-color: var(--accent);
    border-style: solid;
    box-shadow: 0 0 20px var(--accent-glow);
  }

  .git-zone h4 {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .git-zone .file-icon {
    font-size: 1.4rem;
    margin-bottom: 4px;
  }

  .git-zone .file-name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    color: var(--text);
  }

  .git-arrow {
    color: var(--text-muted);
    font-size: 1.4rem;
    flex-shrink: 0;
  }

  .git-zone.staging.active { border-color: var(--orange); box-shadow: 0 0 20px rgba(210,153,34,0.15); }
  .git-zone.repo.active { border-color: var(--green); box-shadow: 0 0 20px var(--green-glow); }

  /* ── Quiz ── */
  .quiz-container {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin: 16px 0;
  }

  .quiz-question {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 16px;
  }

  .quiz-options {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .quiz-option {
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.15s;
    background: var(--bg-tertiary);
  }

  .quiz-option:hover { border-color: var(--accent); }
  .quiz-option.selected { border-color: var(--accent); background: var(--accent-glow); }
  .quiz-option.correct { border-color: var(--green); background: var(--green-glow); color: var(--green); }
  .quiz-option.incorrect { border-color: var(--red); background: rgba(248,81,73,0.1); color: var(--red); }
  .quiz-option.disabled { pointer-events: none; opacity: 0.6; }

  .quiz-feedback {
    margin-top: 12px;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 0.88rem;
    display: none;
  }

  .quiz-feedback.show { display: block; }
  .quiz-feedback.correct { background: var(--green-glow); color: var(--green); }
  .quiz-feedback.incorrect { background: rgba(248,81,73,0.1); color: var(--red); }

  /* ── Buttons Area ── */
  .lesson-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 40px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  .completion-banner {
    text-align: center;
    padding: 40px;
    animation: fadeIn 0.5s ease;
  }

  .completion-banner .big-icon { font-size: 4rem; margin-bottom: 16px; }
  .completion-banner h2 { font-size: 1.6rem; margin-bottom: 8px; }
  .completion-banner p { color: var(--text-muted); margin-bottom: 24px; }

  /* ── Welcome Screen ── */
  .welcome {
    text-align: center;
    padding: 60px 20px;
    animation: fadeIn 0.5s ease;
  }

  .welcome .big-icon { font-size: 5rem; margin-bottom: 20px; }
  .welcome h2 { font-size: 2rem; font-weight: 800; margin-bottom: 12px; }
  .welcome p { color: var(--text-muted); font-size: 1rem; max-width: 500px; margin: 0 auto 32px; line-height: 1.7; }

  .welcome-features {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    max-width: 600px;
    margin: 0 auto 32px;
  }

  .welcome-feature {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 16px;
    text-align: center;
  }

  .welcome-feature .feat-icon { font-size: 1.8rem; margin-bottom: 8px; }
  .welcome-feature h4 { font-size: 0.85rem; margin-bottom: 4px; }
  .welcome-feature p { font-size: 0.75rem; color: var(--text-muted); margin: 0; }

  /* ── Mobile ── */
  .mobile-toggle {
    display: none;
    background: none;
    border: none;
    color: var(--text);
    font-size: 1.4rem;
    cursor: pointer;
  }

  @media (max-width: 768px) {
    .sidebar {
      position: fixed;
      left: 0; top: 0; bottom: 0;
      z-index: 100;
      transform: translateX(-100%);
    }
    .sidebar.open { transform: translateX(0); }
    .mobile-toggle { display: block; }
    .content-area { padding: 20px 16px; }
    .git-diagram { flex-direction: column; }
    .git-arrow { transform: rotate(90deg); }
  }

  /* ── Sidebar overlay on mobile ── */
  .sidebar-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 99;
  }
  .sidebar-overlay.show { display: block; }
</style>
</head>
<body>

<div class="app">
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1><span class="icon">🔀</span> Aprende Git</h1>
      <p>Tutorial interactivo paso a paso</p>
      <div class="progress-bar-container">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="progress-text" id="progressText">0% completado</div>
    </div>
    <nav class="lessons-list" id="lessonsList"></nav>
  </aside>

  <main class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="mobile-toggle" onclick="toggleSidebar()">☰</button>
        <span class="topbar-title" id="topbarTitle">Inicio</span>
      </div>
      <div class="topbar-actions">
        <button class="btn" onclick="resetProgress()">↻ Resetear</button>
      </div>
    </div>

    <div class="content-area" id="contentArea">
      <!-- Content injected by JS -->
    </div>
  </main>
</div>

<script>
// ── Lesson Data ──
const lessons = [
  {
    id: 'welcome',
    group: '',
    title: 'Bienvenida',
    icon: '🏠',
    content: () => `
      <div class="welcome">
        <div class="big-icon">🚀</div>
        <h2>Aprende Git desde cero</h2>
        <p>Un tutorial interactivo para dominar los fundamentos de Git, el sistema de control de versiones más usado del mundo.</p>
        <div class="welcome-features">
          <div class="welcome-feature">
            <div class="feat-icon">📖</div>
            <h4>Lecciones</h4>
            <p>Contenido claro y conciso</p>
          </div>
          <div class="welcome-feature">
            <div class="feat-icon">💻</div>
            <h4>Terminal</h4>
            <p>Practica comandos reales</p>
          </div>
          <div class="welcome-feature">
            <div class="feat-icon">🎯</div>
            <h4>Ejercicios</h4>
            <p>Pon a prueba tus conocimientos</p>
          </div>
        </div>
        <button class="btn btn-primary" onclick="goToLesson(1)" style="padding:10px 28px;font-size:0.95rem;">
          Comenzar →
        </button>
      </div>
    `
  },
  {
    id: 'what-is-git',
    group: 'Fundamentos',
    title: '¿Qué es Git?',
    icon: '📦',
    content: () => `
      <div class="lesson-content">
        <span class="lesson-badge">Lección 1 · Fundamentos</span>
        <h2>📦 ¿Qué es Git?</h2>
        <p>Git es un <strong>sistema de control de versiones distribuido</strong>. Esto significa que mantiene un registro de los cambios realizados en archivos a lo largo del tiempo, permitiéndote volver a versiones anteriores y colaborar con otros.</p>

        <div class="info-box tip">
          <strong>💡 ¿Por qué es importante?</strong><br>
          Casi todos los proyectos de software profesional usan Git. Es la herramienta base para trabajar en equipo y contribuir a proyectos de código abierto.
        </div>

        <h3>Conceptos clave</h3>
        <ul>
          <li><strong>Repositorio (Repository):</strong> Una carpeta que contiene tu proyecto y todo su historial de cambios. Se identifica por la carpeta oculta <code>.git</code>.</li>
          <li><strong>Commit:</strong> Una "instantánea" de tus archivos en un momento dado. Cada commit tiene un ID único y un mensaje descriptivo.</li>
          <li><strong>Rama (Branch):</strong> Una línea de desarrollo independiente. Puedes tener múltiples ramas para trabajar en distintas features sin afectar otras.</li>
          <li><strong>HEAD:</strong> Un puntero que indica en qué commit estás parado actualmente.</li>
        </ul>

        <div class="info-box">
          <strong>🔄 Git es distribuido:</strong> A diferencia de sistemas centralizados, cada desarrollador tiene una copia completa del historial en su máquina. Esto lo hace rápido y resistente a fallos.
        </div>
      </div>
    `
  },
  {
    id: 'setup',
    group: 'Fundamentos',
    title: 'Configuración inicial',
    icon: '⚙️',
    content: () => `
      <div class="lesson-content">
        <span class="lesson-badge">Lección 2 · Fundamentos</span>
        <h2>⚙️ Configuración Inicial</h2>
        <p>Antes de empezar a usar Git, necesitas configurar tu nombre y correo electrónico. Esta información se associa a cada commit que realices.</p>

        <div class="code-block">
          <div class="code-header">
            <span>Terminal</span>
            <button class="copy-btn" onclick="copyCode(this)">Copiar</button>
          </div>
          <pre><span class="cmd">git</span> <span class="flag">config</span> <span class="flag">--global</span> user.name <span class="string">"Tu Nombre"</span>
<span class="cmd">git</span> <span class="flag">config</span> <span class="flag">--global</span> user.email <span class="string">"tu.email@ejemplo.com"</span></pre>
        </div>

        <div class="info-box warning">
          <strong>⚠️ Nota:</strong> El flag <code>--global</code> aplica la configuración a todos los repositorios de tu máquina. Si quieres configurar solo uno, quita el flag.
        </div>

        <h3>Prueba en la terminal</h3>
        <p>Escribe el comando de configuración para practicar:</p>
        <div class="terminal" id="terminal-setup">
          <div class="terminal-header">
            <div class="terminal-dot red"></div>
            <div class="terminal-dot yellow"></div>
            <div class="terminal-dot green"></div>
            <span class="terminal-title">terminal — git config</span>
          </div>
          <div class="terminal-body" id="terminal-body-setup"></div>
          <div style="padding:8px 16px 12px;">
            <div class="terminal-input-line">
              <span class="prompt">~$</span>
              <input class="terminal-input" id="terminal-input-setup" placeholder="Escribe un comando..." autofocus
                onkeydown="if(event.key==='Enter')handleTerminalCommand('setup')">
            </div>
          </div>
        </div>
      </div>
    `
  },
  {
    id: 'git-init-clone',
    group: 'Fundamentos',
    title: 'Obtener un repositorio',
    icon: '📂',
    content: () => `
      <div class="lesson-content">
        <span class="lesson-badge">Lección 3 · Fundamentos</span>
        <h2>📂 Obtener un Repositorio</h2>
        <p>Hay dos formas principales de empezar a trabajar con Git:</p>

        <h3>1. Clonar un repositorio existente</h3>
        <p>Crea una copia local de un repositorio remoto (por ejemplo, de GitHub).</p>
        <div class="code-block">

function init() {
  renderSidebar();

function renderSidebar() {
  const list = document.getElementById('lessonsList');
  let currentGroup = '';
  let html = '';

  lessons.forEach((lesson, i) => {
    if (lesson.group && lesson.group !== currentGroup) {
      currentGroup = lesson.group;
      html += `<div class="lesson-group-title">${currentGroup}</div>`;
    }
    const isActive = i === currentLesson;
    const isCompleted = completedLessons.includes(lesson.id);
    const classes = ['lesson-item'];
    if (isActive) classes.push('active');
    if (isCompleted) classes.push('completed');

    html += `
      <div class="${classes.join(' ')}" onclick="goToLesson(${i})">
        <div class="lesson-check">${isCompleted ? '✓' : ''}</div>
        <span>${lesson.icon} ${lesson.title}</span>
      </div>
    `;
  });

  list.innerHTML = html;
  updateProgress();
}

function updateProgress() {
  const total = lessons.filter(l => l.id !== 'welcome' && l.id !== 'complete').length;
  const done = completedLessons.filter(id => id !== 'welcome' && id !== 'complete').length;
  const pct = Math.round((done / total) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${pct}% completado`;
}

function renderLesson() {
  const lesson = lessons[currentLesson];
  document.getElementById('topbarTitle').textContent = lesson.icon + ' ' + lesson.title;

  let content = lesson.content();

  if (lesson.id === 'complete' || (currentLesson === lessons.length - 1 && completedLessons.includes('quiz'))) {
    content = `
      <div class="completion-banner">
        <div class="big-icon">🏆</div>
        <h2>¡Felicitaciones!</h2>
        <p>Has completado el tutorial de Git. Ya tienes los fundamentos para empezar a usar Git en tus proyectos y contribuir a código abierto.</p>
        <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
          <button class="btn btn-primary" onclick="goToLesson(0)">↻ Repasar desde el inicio</button>
        </div>
      </div>
    `;
  }

  content += `
    <div class="lesson-nav">
      <button class="btn" onclick="prevLesson()" ${currentLesson === 0 ? 'style="visibility:hidden"' : ''}>← Anterior</button>
      <button class="btn btn-success" onclick="completeAndNext()">
        ${currentLesson === lessons.length - 1 ? '🏆 Finalizar' : 'Marcar completo →'}
      </button>
    </div>
  `;

  document.getElementById('contentArea').innerHTML = content;

  if (lesson.quiz) initQuiz();
  if (lesson.id === 'setup') initTerminal('setup');
  if (lesson.id === 'workflow') initTerminal('workflow');

  document.getElementById('contentArea').scrollTop = 0;
  renderSidebar();
}

function goToLesson(index) {
  currentLesson = index;
  renderLesson();
}

function nextLesson() {
  if (currentLesson < lessons.length - 1) {
    currentLesson++;
    renderLesson();
  }
}

function prevLesson() {
  if (currentLesson > 0) {
    currentLesson--;
    renderLesson();
  }
}

function completeAndNext() {
  const lesson = lessons[currentLesson];
  if (lesson.quiz) {
    const totalQ = quizData.length;
    const answeredQ = Object.keys(quizAnswered).length;
    if (answeredQ < totalQ) {
      const feedback = document.getElementById('quizFeedback');
      if (feedback) {
        feedback.className = 'quiz-feedback show incorrect';
        feedback.textContent = `Responde todas las preguntas antes de continuar (${answeredQ}/${totalQ})`;
      }
      return;
    }
  }
  if (!completedLessons.includes(lesson.id)) {
    completedLessons.push(lesson.id);
    localStorage.setItem('git-tutorial-progress', JSON.stringify(completedLessons));
  }
  nextLesson();
}

function resetProgress() {
  if (!confirm('¿Resetear todo el progreso?')) return;
  completedLessons = [];
  quizAnswered = {};
  localStorage.removeItem('git-tutorial-progress');
  currentLesson = 0;
  renderLesson();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('show');
}

// ── Terminal ──
function initTerminal(id) {
  const body = document.getElementById(`terminal-body-${id}`);
  if (!body) return;
  const state = terminalStates[id];
  renderTerminalOutput(id);
  setTimeout(() => {
    const input = document.getElementById(`terminal-input-${id}`);
    if (input) input.focus();
  }, 100);
}

function renderTerminalOutput(id) {
  const body = document.getElementById(`terminal-body-${id}`);
  const state = terminalStates[id];
  if (!body || !state) return;

  let html = '';
  state.history.forEach(line => {
    if (line.type === 'input') {
      html += `<div class="terminal-line"><span class="prompt">${line.prompt || '$'}</span> ${escHtml(line.text)}</div>`;
    } else if (line.type === 'branch') {
      html += `<div class="terminal-line"><span class="branch">${line.text}</span></div>`;
    } else {
      html += `<div class="terminal-line"><span class="output">${line.text}</span></div>`;
    }
  });
  body.innerHTML = html;
  body.scrollTop = body.scrollHeight;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function handleTerminalCommand(id) {
  const input = document.getElementById(`terminal-input-${id}`);
  const cmd = input.value.trim();
  input.value = '';
  if (!cmd) return;

  const state = terminalStates[id];
  const promptText = id === 'workflow' ? '~/proyecto (main) $' : '~$';
  state.history.push({ type: 'input', text: cmd, prompt: promptText });

  if (id === 'setup') handleSetupCommand(cmd, state);
  else if (id === 'workflow') handleWorkflowCommand(cmd, state);

  renderTerminalOutput(id);
}

function handleSetupCommand(cmd, state) {
  const lower = cmd.toLowerCase();
  if (lower.includes('git config') && lower.includes('user.name')) {
    state.history.push({ type: 'output', text: '✅ Nombre configurado correctamente.' });
  } else if (lower.includes('git config') && lower.includes('user.email')) {
    state.history.push({ type: 'output', text: '✅ Email configurado correctamente.' });
  } else if (lower === 'git config --global user.name "tu nombre"' || lower === "git config --global user.name 'tu nombre'") {
    state.history.push({ type: 'output', text: '✅ Nombre configurado correctamente.' });
  } else if (lower.includes('git config') && lower.includes('user')) {
    state.history.push({ type: 'output', text: '✅ Configuración actualizada.' });
  } else if (lower === 'clear') {
    state.history = [{ type: 'output', text: '🔧 Terminal limpiada.' }];
  } else if (lower === 'help') {
    state.history.push({ type: 'output', text: 'Prueba: git config --global user.name "Tu Nombre"' });
    state.history.push({ type: 'output', text: 'Prueba: git config --global user.email "email@ejemplo.com"' });
  } else {
    state.history.push({ type: 'output', text: '💡 Tip: Usa "git config --global user.name" o "help" para ver ayuda.' });
  }
}

function handleWorkflowCommand(cmd, state) {
  const lower = cmd.toLowerCase().trim();
  if (lower === 'clear') {
    state.history = [
      { type: 'output', text: '📂 Directorio de trabajo: ~/proyecto (rama: main)' },
    ];
    return;
  }

  if (lower === 'git status') {
    let output = 'On branch <span style="color:var(--green)">main</span>\n';
    if (state.files.length === 0 && state.staged.length === 0) {
      output += '\nnothing to commit, working tree clean';
    } else {
      if (state.staged.length > 0) {
        output += '\nChanges to be committed:\n';
        state.staged.forEach(f => output += `  <span style="color:var(--green)">new file:   ${f}</span>\n`);
      }
      if (state.files.length > 0) {
        output += '\nUntracked files:\n';
        state.files.forEach(f => output += `  <span style="color:var(--red)">${f}</span>\n`);
      }
    }
    state.history.push({ type: 'output', text: output });
  } else if (lower.startsWith('touch ') || lower.startsWith('echo ')) {
    const fname = cmd.split(/\s+/).pop();
    if (fname && !fname.startsWith('>') && !fname.startsWith('-')) {
      state.files.push(fname);
      state.history.push({ type: 'output', text: `📄 Archivo "${fname}" creado.` });
    } else {
      state.history.push({ type: 'output', text: '📄 Archivo creado.' });
    }
  } else if (lower.startsWith('git add')) {
    const target = cmd.split(/\s+/).pop();
    if (target === '.' || target === '-A') {
      state.staged.push(...state.files);
      state.files = [];
      state.history.push({ type: 'output', text: `📦 Todos los archivos añadidos al staging.` });
    } else if (state.files.includes(target)) {
      state.files = state.files.filter(f => f !== target);
      state.staged.push(target);
      state.history.push({ type: 'output', text: `📦 "${target}" añadido al staging.` });
    } else if (state.staged.includes(target)) {
      state.history.push({ type: 'output', text: `"${target}" ya está en staging.` });
    } else {
      state.history.push({ type: 'output', text: `⚠️ No se encontró "${target}". Usa "git status" para ver archivos.` });
    }
  } else if (lower.startsWith('git commit')) {
    if (state.staged.length === 0) {
      state.history.push({ type: 'output', text: '⚠️ Nothing to commit. Añade archivos con "git add" primero.' });
    } else {
      const msg = cmd.match(/-m\s+["'](.+?)["']/);
      if (!msg) {
        state.history.push({ type: 'output', text: '⚠️ Necesitas un mensaje: git commit -m "tu mensaje"' });
      } else {
        state.committed.push({ files: [...state.staged], msg: msg[1] });
        state.history.push({ type: 'output', text: `[main ${randomHash()}] ${msg[1]}` });
        state.history.push({ type: 'output', text: `${state.staged.length} file(s) changed` });
        state.staged = [];
      }
    }
  } else if (lower === 'git log') {
    if (state.committed.length === 0) {
      state.history.push({ type: 'output', text: 'No hay commits aún.' });
    } else {
      [...state.committed].reverse().forEach((c, i) => {
        state.history.push({ type: 'output', text: `<span style="color:var(--orange)">${randomHash()}</span> (${c.files.join(', ')})` });
        state.history.push({ type: 'output', text: `    ${c.msg}` });
      });
    }
  } else if (lower.startsWith('git branch')) {
    state.history.push({ type: 'branch', text: '* <span style="color:var(--green)">main</span>' });
  } else if (lower.startsWith('git diff')) {
    state.history.push({ type: 'output', text: state.files.length > 0 ? 'Diff mostrando cambios pendientes...' : 'No hay cambios para mostrar.' });
  } else if (lower === 'help') {
    state.history.push({ type: 'output', text: 'Comandos disponibles: touch, echo, git add, git status, git commit, git log, git branch, git diff, clear' });
  } else {
    state.history.push({ type: 'output', text: `💡 Comando no simulado: "${cmd}". Escribe "help" para ver comandos disponibles.` });
  }
}

function randomHash() {
  return Math.random().toString(16).slice(2, 9);
}

// ── Quiz ──
function initQuiz() {
  const container = document.getElementById('quizContainer');
  if (!container) return;
  let html = '';

  quizData.forEach((q, qi) => {
    html += `<div class="quiz-container" id="quiz-${qi}">`;
    html += `<div class="quiz-question">${qi + 1}. ${q.q}</div>`;
    html += `<div class="quiz-options">`;
    q.options.forEach((opt, oi) => {
      html += `<div class="quiz-option" id="quiz-${qi}-opt-${oi}" onclick="answerQuiz(${qi}, ${oi})">${opt}</div>`;
    });
    html += `</div>`;
    html += `<div class="quiz-feedback" id="quiz-feedback-${qi}"></div>`;
    html += `</div>`;
  });

  html += `<div class="quiz-feedback" id="quizFeedback" style="margin-top:16px;text-align:center;"></div>`;
  container.innerHTML = html;
}

function answerQuiz(qi, oi) {
  if (quizAnswered[qi] !== undefined) return;
  quizAnswered[qi] = oi;

  const q = quizData[qi];
  const isCorrect = oi === q.correct;

  // Disable all options in this question
  q.options.forEach((_, i) => {
    const el = document.getElementById(`quiz-${qi}-opt-${i}`);
    el.classList.add('disabled');
    if (i === q.correct) el.classList.add('correct');
    if (i === oi && !isCorrect) el.classList.add('incorrect');
  });

  const feedback = document.getElementById(`quiz-feedback-${qi}`);
  feedback.className = `quiz-feedback show ${isCorrect ? 'correct' : 'incorrect'}`;
  feedback.textContent = (isCorrect ? '✅ Correcto! ' : '❌ Incorrecte. ') + q.explanation;

  // Check if all answered
  const totalQ = quizData.length;
  const answeredQ = Object.keys(quizAnswered).length;
  if (answeredQ === totalQ) {
    const correctCount = Object.entries(quizAnswered).filter(([k, v]) => quizData[k].correct === v).length;
    const mainFeedback = document.getElementById('quizFeedback');
    mainFeedback.className = `quiz-feedback show ${correctCount >= quizData.length * 0.7 ? 'correct' : 'incorrect'}`;
    mainFeedback.textContent = `Obtuviste ${correctCount}/${totalQ} respuestas correctas. ${correctCount === totalQ ? '¡Perfecto! 🎉' : correctCount >= quizData.length * 0.7 ? '¡Buen trabajo! 👏' : '¡Repasa las lecciones y vuelve a intentarlo!'}`;
  }
}

// ── Copy Code ──
function copyCode(btn) {
  const pre = btn.closest('.code-block').querySelector('pre');
  navigator.clipboard.writeText(pre.textContent).then(() => {
    btn.textContent = '✓ Copiado';
    setTimeout(() => btn.textContent = 'Copiar', 1500);
  });
}

// ── Keyboard shortcuts ──
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' && !e.target.matches('input,textarea')) {
    if (currentLesson < lessons.length - 1) nextLesson();
  }
  if (e.key === 'ArrowLeft' && !e.target.matches('input,textarea')) {
    prevLesson();
  }
});

init();
</script>
