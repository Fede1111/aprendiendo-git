<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aprende Git - Tutorial Interactivo</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1><span class="icon">🔀</span> Aprende Git</h1>
      <p>Tutorial interactivo paso a paso</p>
      <div class="progress-bar-container">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="progress-text" id="progressText">0% completado</div>
    </div>
    <nav class="lessons-list" id="lessonsList"></nav>
  </aside>

  <main class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="mobile-toggle" onclick="toggleSidebar()">☰</button>
        <span class="topbar-title" id="topbarTitle">Inicio</span>
      </div>
      <div class="topbar-actions">
        <button class="btn" onclick="resetProgress()">↻ Resetear</button>
      </div>
    </div>

    <div class="content-area" id="contentArea">
      <!-- Content injected by JS -->
    </div>
  </main>
</div>

<canvas id="matrixCanvas"></canvas>

<script src="app.js"></script>
</body>
</html>
